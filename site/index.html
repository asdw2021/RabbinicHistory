<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Historical Borders, Cities, Battles, Events & Rabbis</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
.stacked-container {
  position: relative;
  display: inline-block;
}

.leaflet-pane .sefarim-marker,
.leaflet-pane .sefarim-label {
  z-index: 99999 !important;
}

.rabbi-single-name:hover,
.rabbi-name:hover,
.rabbi-label:hover,
.label-text:hover {
  text-decoration: underline;
  cursor: pointer;
}

.stacked-item {
  position: absolute;
  top: 0;
  left: 0;
}
.stacked-item.behind {
  transform: translate(-15%, -15%);
  opacity: 0.9;
}
.stacked-names {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 4px;
}

    #year {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, .9);
      padding: 8px 20px;
      border-radius: 8px;
      font: 700 22px/1.2 'Segoe UI', sans-serif;
      z-index: 1000;
    }

.leaflet-popup.auto-event-popup .leaflet-popup-content-wrapper {
  background: rgba(255, 248, 220, 0.85);
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(200,180,120,0.6);
  padding: 6px 10px;
}

.auto-event-content {
  font-size: 13px;
  font-style: italic;
  color: #333;
}

    .leaflet-marker-icon,
    .leaflet-interactive {
      transition: opacity 0.5s ease;
    }

    #slider {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: 60%;
      z-index: 1001;
    }

    #rangeBox {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      padding: 6px 10px;
      border-radius: 6px;
      z-index: 1002;
      font: 600 12px/1 sans-serif;
    }

    #rangeBox input {
      width: 70px;
      margin: 0 4px;
    }

    #yearNav {
      position: absolute;
      top: 12px;
      left: 10px;
      z-index: 1003;
      display: flex;
      gap: 6px;
    }

    #yearNav button {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #888;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #yearNav button:hover {
      background: #eee;
    }

    #filters {
      position: absolute;
      top: 60px;
      right: 10px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border-radius: 8px;
      font: 13px/1.4 'Segoe UI', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      z-index: 1004;
    }

    #filters label {
      display: block;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .city {
      pointer-events: none;
      user-select: none;
      color: #000;
      font-weight: 600;
      font-style: italic;
      font-size: 10px !important;
    }

    .label-text {
      font-weight: 700;
      text-shadow: 0 0 2px #fff;
      color: #000;
      text-align: center;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .rabbi-label {
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: bold;
      color: white;
      white-space: nowrap;
      text-align: center;
      margin-top: 4px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }

    #eventBox {
      position: absolute;
      top: 120px;
      left: 10px;
      background: #fdf6e3;
      padding: 10px 14px;
      border-radius: 8px;
      font: 14px/1.4 'Segoe UI', sans-serif;
      box-shadow: 0 3px 12px rgba(0,0,0,0.4);
      max-width: 260px;
      z-index: 1005;
      display: none;
    }

    #eventBox ul {
      margin: 0;
      padding-left: 18px;
    }

    .leaflet-popup.compact-popup .leaflet-popup-content-wrapper {
      background: white;
      border: none;
      box-shadow: none;
      padding: 2px 4px;
    }

    .leaflet-popup.compact-popup .leaflet-popup-content {
      margin: 0;
      font-size: 12px;
      line-height: 1.2;
    }

    .leaflet-popup.compact-popup .leaflet-popup-tip-container {
      display: none;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="year">Loading...</div>

  <div id="yearNav">
    <button id="prevYear">⬅ Prev</button>
    <button id="nextYear">Next ➡</button>
  </div>

  <input id="slider" type="range" min="0" max="0" step="1" value="0" />

  <div id="rangeBox">
    From <input type="number" id="fromYear"/>
    to <input type="number" id="toYear"/>
    <button id="applyRange">Set</button>
  </div>

<div id="filters">
  <label><input type="checkbox" id="toggleRabbis" checked> Rabbis</label>
  <label><input type="checkbox" id="toggleShuls" checked> Shuls</label>
  <label><input type="checkbox" id="togglePersonalities" checked> Personalities</label>
  <label><input type="checkbox" id="toggleBattles" checked> Battles</label>
  <label><input type="checkbox" id="toggleEvents" checked> Events</label>
  <label><input type="checkbox" id="toggleRabbiEvents" checked> Rabbi Events</label>
</div>

  <div id="eventBox"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* ==================
       Constants & Data
       ================== */
    const RABBI_SCALE = 0.8;
    const FADE_DURATION = 600;
    const SHUL_SCALE = 1.2;

    // These are now loaded from site/data/*.json instead of embedded into the HTML.
    const bordersEuropeEnhanced = {};
    let colors = {};
    let YEARS = [];
    let CITIES = [];
    let BATTLES = [];
    let EVENTS = [];
    let RABBIS = [];
    let RABBIS_MOV = {};
    let PERSONALITIES = [];
    let PERSONALITIES_MOV = {};
    let SHULS = [];
    let SHULS_MOV = {};
    let BIBLE_PLACES = [];

    async function loadJSON(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Failed to load ${path}: ${response.status}`);
      }
      return await response.json();
    }

    async function loadInitialData() {
      [
        colors,
        YEARS,
        CITIES,
        BATTLES,
        EVENTS,
        RABBIS,
        RABBIS_MOV,
        PERSONALITIES,
        PERSONALITIES_MOV,
        SHULS,
        SHULS_MOV,
        BIBLE_PLACES
      ] = await Promise.all([
        loadJSON("data/colors.json"),
        loadJSON("data/years.json"),
        loadJSON("data/cities.json"),
        loadJSON("data/battles.json"),
        loadJSON("data/events.json"),
        loadJSON("data/rabbis.json"),
        loadJSON("data/rabbis_movement.json"),
        loadJSON("data/personalities.json"),
        loadJSON("data/personalities_movement.json"),
        loadJSON("data/shuls.json"),
        loadJSON("data/shuls_movement.json"),
        loadJSON("data/bible_places.json")
      ]);
    }

    async function loadBordersForYear(year) {
      if (bordersEuropeEnhanced[year]) return bordersEuropeEnhanced[year];
      const borderData = await loadJSON(`data/borders/${year}.geojson`);
      bordersEuropeEnhanced[year] = borderData;
      return borderData;
    }

    /* ==================
       Map Init
       ================== */
const map = L.map('map', { center: [52, 10], zoom: 4 });
map.createPane("bordersPane").style.zIndex = 200;
map.createPane("shulsPane").style.zIndex = 600;

map.createPane("sefarimPane");
map.getPane("sefarimPane").style.zIndex = 690;
map.getPane("sefarimPane").style.pointerEvents = "auto";

map.createPane("rabbisPane");
map.getPane("rabbisPane").style.zIndex = 680;
map.getPane("rabbisPane").style.pointerEvents = "auto";
map.getPane('popupPane').style.zIndex = 1000;

    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 19 }
    ).addTo(map);

    const yearBox = document.getElementById('year');
    const slider = document.getElementById('slider');
    const fromInput = document.getElementById('fromYear');
    const toInput = document.getElementById('toYear');
    const applyBtn = document.getElementById('applyRange');
    const eventBox = document.getElementById('eventBox');

    let layer = null, currentBorderYear = null;
    let cityM = [], battleM = [], battleLabels = [], eventM = [], eventLabels = [], shulM = [];
    let rabbiM = {};
    let currentYear = null;
    let ACTIVE_YEARS = [];
    let currentIndex = 0;
    let rabbiEventPopups = [];

    const CITY_MIN_ZOOM = 6,
          SHUL_MIN_ZOOM = 7,
          RABBI_MIN_ZOOM = 8;

const filters = {
  rabbis: document.getElementById("toggleRabbis"),
  shuls: document.getElementById("toggleShuls"),
  personalities: document.getElementById("togglePersonalities"),
  battles: document.getElementById("toggleBattles"),
  events: document.getElementById("toggleEvents"),
  rabbiEvents: document.getElementById("toggleRabbiEvents"),
};

    /* ==================
       Utility Functions
       ================== */
    function animateMarker(marker, from, to, duration = 1000) {
      const start = performance.now();
      function step(ts) {
        const t = Math.min(1, (ts - start) / duration);
        marker.setLatLng([from[0] + (to[0] - from[0]) * t, from[1] + (to[1] - from[1]) * t]);
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
function setPointerEvents(el, on) {
  if (!el) return;
  const node = el.getElement ? el.getElement() : el;
  if (node) node.style.pointerEvents = on ? 'auto' : 'none';
}

    function clearMarkers(arr) {
      arr.forEach(m => map.removeLayer(m));
      arr.length = 0;
    }

    function colour(f) {
      const n = f.properties?.Name || f.properties?.NAME || f.properties?.name || f.properties?.admin;
      return { color: '#000', weight: 1, fillOpacity: 0.4, fillColor: colors[n] || '#888' };
    }

    function getPosition(movement, year) {
      let last = null;
      for (let m of movement) {
        if (m.year <= year) last = m;
        else break;
      }
      return last ? last.latlng : null;
    }

    function buildPopup(content) {
      return `<div style="background:#eee;padding:6px 10px;border-radius:6px;font-style:italic;max-width:250px;">${content}</div>`;
    }
function buildEntityPopup(entities, year) {
  if (entities.length > 1) {
let imgRow = entities.map((r, idx) => {
  const imgSrc = r.img || r.image || "";
  if (!imgSrc) return "";
  return `<img src="${imgSrc}" 
               title="${r.name}"
               class="rabbi-popup-img"
               data-rabbi-index="${idx}"
               style="width:70px;height:70px;object-fit:cover;
                      border-radius:50%;border:1px solid #333;
                      margin:0 4px;cursor:pointer;">`;
}).join("");

    let details = entities.map(r => {
      let ageInfo = "";
      if (r.birth_year) {
        if (r.death_year && year >= r.death_year) {
          ageInfo = ` (died at ${r.death_year - r.birth_year})`;
        } else if (year >= r.birth_year) {
          ageInfo = ` (age ${year - r.birth_year})`;
        }
      }
      let yearsStr = r.birth_year ? r.birth_year + (r.death_year ? "–" + r.death_year : "") : "";
      return `
        <div style="margin-top:6px;">
          <strong>${r.name}</strong><br>
          ${yearsStr}${ageInfo}<br>
          ${r.bio || ""}
        </div>
      `;
    }).join("<hr>");

    return buildPopup(`
      <div style="text-align:center;margin-bottom:8px;">${imgRow}</div>
      ${details}
    `);
  } else {
    const r = entities[0];
    const imgSrc = r.img || r.image || "";
    let imgHtml = imgSrc ? `<div style="margin-bottom:6px;">
      <img src="${imgSrc}" style="max-width:150px;max-height:150px; border-radius:8px;border:1px solid #333;">
    </div>` : "";

    let ageInfo = "";
    if (r.birth_year) {
      if (r.death_year && year >= r.death_year) {
        ageInfo = ` (died at ${r.death_year - r.birth_year})`;
      } else if (year >= r.birth_year) {
        ageInfo = ` (age ${year - r.birth_year})`;
      }
    }

    let yearsStr = r.birth_year ? r.birth_year + (r.death_year ? "–" + r.death_year : "") : "";

    return buildPopup(`
      ${imgHtml}
      <strong>${r.name}</strong><br>
      ${yearsStr}${ageInfo}<br>
      ${r.bio || ""}
    `);
  }
}

    const entityColors = {};
    function getEntityColor(name) {
      if (!entityColors[name]) {
        const h = Math.abs(name.split("").reduce((a, c) => a + c.charCodeAt(0), 0)) % 360;
        entityColors[name] = `hsl(${h},70%,45%)`;
      }
      return entityColors[name];
    }

    /* ==================
       Drawing Functions
       ================== */
    function drawCities(year) {
      clearMarkers(cityM);
      if (map.getZoom() >= CITY_MIN_ZOOM) {
        CITIES.filter(c => c.founding <= year).forEach(c => {
          cityM.push(
            L.marker([c.lat, c.lng], {
              icon: L.divIcon({ className: 'city', html: c.name, iconSize: [100, 20] }),
              interactive: false
            }).addTo(map)
          );
        });
      }
    }

    function updateEventBox(events) {
      if (events.length === 0) {
        eventBox.style.display = "none";
        return;
      }
      eventBox.style.display = "block";
      eventBox.innerHTML = "<ul>" + events.map(e => `<li>${e}</li>`).join("") + "</ul>";
    }
function getRabbiTitle(r, y) {
  const nick = r.title || "";
  let period = "";

  if (Array.isArray(r.titles)) {
    const match = r.titles.find(t => y >= t.start && y <= t.end);
    if (match && match.title) period = match.title;
  }

  if (period && nick) return `${period}: ${nick}`;
  if (period) return `${period}`;
  if (nick) return `${nick}`;
  return "";
}
function getRabbiFullName(r, y) {
  let parts = [];

  if (Array.isArray(r.titles)) {
    const match = r.titles.find(t => y >= t.start && y <= t.end);
    if (match && match.title) {
      parts.push(match.title);
    }
  }

  if (r.title) {
    parts.push(r.title);
  }

  parts.push(r.base_name || r.name);

  return parts.join(" ");
}

    /* ==================
       Main Show Function
       ================== */
    async function show(y, animate = false) {
      currentYear = y;
      yearBox.textContent = y;
      let eventsList = [];

      if (window.rabbiEventPopups) {
        rabbiEventPopups.forEach(p => map.removeLayer(p));
      }
      window.rabbiEventPopups = [];

// === Borders: lazy-load only the selected year ===
const validYear = y;
await loadBordersForYear(validYear);

if (validYear !== currentBorderYear) {
  if (layer && map.hasLayer(layer)) map.removeLayer(layer);

  if (bordersEuropeEnhanced[validYear]) {
    if (!bordersEuropeEnhanced[validYear]._layer) {
      bordersEuropeEnhanced[validYear]._layer = L.geoJSON(bordersEuropeEnhanced[validYear], {
        pane: "bordersPane",
        style: colour,
        renderer: L.canvas(),
        onEachFeature: (f, lyr) => {
          const name = f.properties?.Name || f.properties?.NAME || f.properties?.name || f.properties?.admin || "Unknown";
          lyr.on({
            mouseover: e => e.target.setStyle({ weight: 3, color: '#000' }),
            mouseout: e => bordersEuropeEnhanced[validYear]._layer.resetStyle(e.target),
            click: e => lyr.bindPopup(`<b>${name}</b>`).openPopup(e.latlng)
          });
        }
      });
    }

    layer = bordersEuropeEnhanced[validYear]._layer;
    layer.addTo(map);
    currentBorderYear = validYear;
  }
}

      // === Cities ===
      CITIES.forEach(c => {
        if (!c._marker) {
          c._marker = L.marker([c.lat, c.lng], {
            icon: L.divIcon({ className: 'city', html: c.name, iconSize: [100, 20] }),
            interactive: false
          }).addTo(map);
        }
        if (c.founding <= y && map.getZoom() >= CITY_MIN_ZOOM) {
          c._marker.setOpacity(1);
        } else {
          c._marker.setOpacity(0);
        }
      });

      // === Battles ===
      BATTLES.forEach(b => {
        if (!b._marker) {
          b._marker = L.marker([b.lat, b.lng], {
            icon: L.divIcon({ html: '⚔️', className: '', iconSize: [0,0] })
          })
          .bindPopup(buildPopup(`<strong>${b.name}</strong><br>${b.note || b.event || ""}`))
          .addTo(map);
        }
        if (!b._label) {
          b._label = L.marker([b.lat, b.lng], {
            icon: L.divIcon({ className: 'label-text', html: b.name, iconSize: null }),
            interactive: false
          }).addTo(map);
        }
        if (filters.battles.checked && b.year === y) {
          b._marker.setOpacity(1);
          b._label.setOpacity(1);
          eventsList.push(`⚔️ ${b.name} — ${b.note || b.event || ""}`);
        } else {
          b._marker.setOpacity(0);
          b._label.setOpacity(0);
        }
      });

// === Events ===
EVENTS.forEach(ev => {
  const isSefarim = (ev.source === "sefarim") || (ev.name && ev.name.includes("📖"));
  const paneName = isSefarim ? "sefarimPane" : "markerPane";

  if (ev.lat && ev.lng && !ev._marker) {
    let iconHTML = ev.emoji
      ? `<div style="font-size:28px;">${ev.emoji}</div>`
      : ev.img
        ? `<img src="${ev.img}" style="width:30px;height:30px;object-fit:contain;">`
        : `<div style="font-size:20px;">📍</div>`;

    ev._marker = L.marker([ev.lat, ev.lng], {
      pane: paneName,
      zIndexOffset: isSefarim ? 10000 : 0,
      icon: L.divIcon({ html: iconHTML, className: '', iconSize: null })
    }).addTo(map);
  }

  if (ev.lat && ev.lng && !ev._label) {
    ev._label = L.marker([ev.lat, ev.lng], {
      pane: paneName,
      zIndexOffset: isSefarim ? 10000 : 0,
      icon: L.divIcon({ className: 'label-text', html: ev.name, iconSize: null }),
      interactive: true
    }).addTo(map);
  }

  let inRange = false;
  const start = Number(ev.start_year);
  const end = Number(ev.end_year);
  if (ev.year !== undefined) {
    inRange = (y === Number(ev.year));
  } else if (!isNaN(start) && !isNaN(end)) {
    inRange = (y >= start && y <= end);
  }

  if (inRange && filters.events.checked) {
    if (ev._marker) {
      ev._marker.setOpacity(1);
      ev._marker.bindPopup(
        `<strong>${ev.name}</strong><br>${ev.note || ev.event || ""}`
      );
    }
    if (ev._label) {
      ev._label.setOpacity(1);
      ev._label.bindPopup(
        `<strong>${ev.name}</strong><br>${ev.note || ev.event || ""}`
      );
    }
    if (ev._polygon) ev._polygon.setStyle({ opacity: 1, fillOpacity: 0.2 });

    eventsList.push(`${ev.emoji || "📍"} ${ev.name} — ${ev.note || ev.event || ""}`);
  } else {
    if (ev._marker) {
      ev._marker.setOpacity(0);
      ev._marker.unbindPopup();
    }
    if (ev._label) {
      ev._label.setOpacity(0);
      ev._label.unbindPopup();
    }
    if (ev._polygon) ev._polygon.setStyle({ opacity: 0, fillOpacity: 0 });
  }
});

// === Shuls ===
SHULS.forEach(s => {
  if (!s._marker) {
    const color = getEntityColor(s.name);
    const SHUL_IMG_SIZE = 60;

    const iconHTML = s.img
      ? `<img src="${s.img}" style="width:${SHUL_IMG_SIZE}px;height:${SHUL_IMG_SIZE}px;border-radius:6px;border:1px solid #333;">`
      : s.emoji
        ? `<div style="font-size:${SHUL_IMG_SIZE*0.6}px; line-height:1;">${s.emoji}</div>`
        : `<div style="width:${SHUL_IMG_SIZE}px;height:${SHUL_IMG_SIZE}px;background:${color};border-radius:6px;border:1px solid #333;"></div>`;

    s._marker = L.marker([0,0], {
      pane: "shulsPane",
      icon: L.divIcon({
        html: `
          <div style="pointer-events:none; display:flex; flex-direction:column; align-items:center;">
            <div class="rabbi-label" style="pointer-events:auto; cursor:pointer; position:absolute; top:-22px; background:#ddd; color:#000; white-space:nowrap;">
              ${s.name}
            </div>
            <div style="pointer-events:none;">
              ${iconHTML}
            </div>
          </div>`,
        className: '',
        iconSize: [SHUL_IMG_SIZE, SHUL_IMG_SIZE],
        iconAnchor: [SHUL_IMG_SIZE/2, SHUL_IMG_SIZE/2]
      })
    })
    .bindPopup(buildEntityPopup([s], y))
    .addTo(map);
  }

  const alive = (y >= s.birth_year && y <= s.death_year);
  const moves = SHULS_MOV[s.name] || [];
  const pos = getPosition(moves, y) || (s.lat && s.lng ? [s.lat, s.lng] : null);

  if (alive && pos && filters.shuls.checked && map.getZoom() >= SHUL_MIN_ZOOM) {
    if (animate) {
      for (let i = 1; i < moves.length; i++) {
        if (Number(moves[i].year) === y) animateMarker(s._marker, moves[i-1].latlng, moves[i].latlng);
      }
    } else {
      s._marker.setLatLng(pos);
    }
    s._marker.setOpacity(1);

    const moveEvent = moves.find(mv => mv.year === y && mv.event);
    if (moveEvent) eventsList.push(`⛪ ${s.name} — ${moveEvent.event}`);
  } else {
    s._marker.setOpacity(0);
  }
});

      renderRabbis(y, animate);
      updateEventBox(eventsList);
    }

/* ==================
   Rabbis Rendering
   ================== */
function renderRabbis(y, animate) {
  const arrivals = [];

  RABBIS.concat(PERSONALITIES).forEach(r => {
    const alive = (y >= r.birth_year && (!r.death_year || y <= r.death_year));
    const moves = (RABBIS_MOV[r.name] || []).concat(PERSONALITIES_MOV[r.name] || []);
    const pos = getPosition(moves, y) || (r.lat && r.lng ? [r.lat, r.lng] : null);

    if (
      alive &&
      pos &&
      ((RABBIS.includes(r) && filters.rabbis.checked) ||
       (PERSONALITIES.includes(r) && filters.personalities.checked))
    ) {
      if (!r._marker) {
        r._marker = L.marker(pos, {
          pane: "rabbisPane",
          icon: L.divIcon({ html: "", className: "rabbi-img-icon" })
        })
        .bindPopup(buildEntityPopup([r], y))
        .addTo(map);
      }

      if (animate) {
        for (let i = 1; i < moves.length; i++) {
          if (Number(moves[i].year) === y) animateMarker(r._marker, moves[i - 1].latlng, moves[i].latlng);
        }
      } else {
        r._marker.setLatLng(pos);
      }

      r._marker.setOpacity(1);

      const moveEvent = moves.find(mv => mv.year === y && mv.event);
      if (moveEvent && map.getZoom() >= RABBI_MIN_ZOOM && filters.rabbiEvents.checked) {
        if (!r._marker._eventPopup) {
          r._marker._eventPopup = L.popup({
            autoClose: false,
            closeOnClick: false,
            autoPan: false,
            closeButton: false,
            className: "compact-popup auto-event-popup"
          })
          .setLatLng(pos)
          .setContent(`<div class="auto-event-content">${moveEvent.event}</div>`);
          r._marker._eventPopup.addTo(map);
        } else {
          r._marker._eventPopup
            .setLatLng(pos)
            .setContent(`<div class="auto-event-content">${moveEvent.event}</div>`);
          if (!map.hasLayer(r._marker._eventPopup)) {
            r._marker._eventPopup.addTo(map);
          }
        }
      } else {
        if (r._marker._eventPopup && map.hasLayer(r._marker._eventPopup)) {
          map.removeLayer(r._marker._eventPopup);
        }
      }

      arrivals.push({ r, pos });
    } else if (r._marker) {
      r._marker.setOpacity(0);

      if (r._marker._popup) {
        map.closePopup(r._marker._popup);
      }

      if (r._marker._eventPopup && map.hasLayer(r._marker._eventPopup)) {
        map.removeLayer(r._marker._eventPopup);
      }
    }
  });

  setTimeout(() => {
    const groups = {};
    arrivals.forEach(entry => {
      const key = entry.pos.join(",");
      if (!groups[key]) groups[key] = [];
      groups[key].push(entry.r);
    });

    RABBIS.concat(PERSONALITIES).forEach(r => {
      if (r._groupMarker) {
        map.removeLayer(r._groupMarker);
        r._groupMarker = null;
      }
    });

    Object.entries(groups).forEach(([key, rs]) => {
      const pos = key.split(",").map(Number);

      if (rs.length > 1) {
        rs.forEach(r => { if (r._marker) r._marker.setOpacity(0); });

        const marker = L.marker(pos, {
          pane: "rabbisPane",
          icon: L.divIcon({ html: buildGroupHTML(rs, y), className: "rabbi-img-icon" })
        }).addTo(map);

        rs.forEach(r => (r._groupMarker = marker));

        setTimeout(() => {
          const el = marker.getElement();
          if (!el) return;
          const img = el.querySelector(".rabbi-group-img");
          if (img) {
            img.onclick = e => {
              e.stopPropagation();
              marker.bindPopup(buildEntityPopup(rs, currentYear), { autoPan: true }).openPopup();
            };
          }
          el.querySelectorAll(".rabbi-name").forEach((lbl, idx) => {
            lbl.onclick = e => {
              e.stopPropagation();
              const r = rs[idx];
              marker.bindPopup(buildEntityPopup([r], currentYear), { autoPan: true }).openPopup();
            };
          });
        }, 0);
      } else {
        const r = rs[0];
        if (r._marker) {
          r._marker.setLatLng(pos);
          r._marker.setOpacity(1);
          r._marker.setIcon(L.divIcon({
            html: buildSingleHTML(r, y),
            className: "rabbi-img-icon",
            pane: "rabbisPane"
          }));
        }
      }
    });
  }, animate ? 1000 : 0);
}

/* === Helpers === */
function buildSingleHTML(r, y) {
  const color = getEntityColor(r.name);
  const imgSrc = r.img || r.image || "";
  const baseImg = imgSrc
    ? `<img src="${imgSrc}" class="rabbi-single-img"
             style="pointer-events:auto;cursor:pointer;
                    width:${40*RABBI_SCALE}px;height:${40*RABBI_SCALE}px;
                    object-fit:cover;border-radius:50%;border:1px solid #333;">`
    : `<div class="rabbi-single-img"
             style="pointer-events:auto;cursor:pointer;
                    width:${20*RABBI_SCALE}px;height:${20*RABBI_SCALE}px;
                    border-radius:50%;background:${color};"></div>`;

let ageInfo = "";
if (r.birth_year && (!r.death_year || y <= r.death_year)) {
  ageInfo = ` (${y - r.birth_year})`;
}

  let displayName = "";

  if (Array.isArray(r.titles)) {
    const match = r.titles.find(t => y >= t.start && y <= t.end);
    if (match && match.title) {
      displayName += match.title + " ";
    }
  }

  if (r.title) {
    displayName += r.title + " ";
  }

  displayName += (r.base_name || r.name);

  return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
            ${baseImg}
            <div class="rabbi-label rabbi-single-name"
                 style="pointer-events:auto;cursor:pointer;
                        background:${color};white-space:nowrap;">
              ${displayName}${ageInfo}
            </div>
          </div>`;
}

function buildGroupHTML(rs, y) {
  const baseImg =
    `<img src="https://upload.wikimedia.org/wikipedia/commons/8/81/%D7%99%D7%A9%D7%99%D7%91%D7%AA_%D7%94%D7%A0%D7%98%D7%A2_%D7%A9%D7%95%D7%A8%D7%A7_%D7%9E%D7%98%D7%A9%D7%90%D7%98%D7%90_%D7%A8%D7%91%D7%99_%D7%A9%D7%A8%D7%92%D7%90_%D7%A6%D7%91%D7%99_%D7%98%D7%A2%D7%A0%D7%A2%D7%A0%D7%91%D7%95%D7%99%D7%9D.jpg"
          class="rabbi-group-img"
          style="pointer-events:auto;cursor:pointer;
                 width:${40*RABBI_SCALE}px;height:${40*RABBI_SCALE}px;
                 object-fit:cover;border-radius:50%;border:1px solid #333;">`;

  let namesHTML = `<div class="stacked-names"
                         style="display:flex;flex-direction:column;
                                align-items:center;margin-top:4px;">`;

  rs.forEach((r, idx) => {
    const color = getEntityColor(r.name);

    let ageInfo = "";
    if (r.birth_year) {
      if (r.death_year && y >= r.death_year) {
        ageInfo = ` (✝ ${r.death_year - r.birth_year})`;
      } else if (y >= r.birth_year) {
        ageInfo = ` (${y - r.birth_year})`;
      }
    }

    let displayName = "";

    if (Array.isArray(r.titles)) {
      const match = r.titles.find(t => y >= t.start && y <= t.end);
      if (match && match.title) {
        displayName += match.title + " ";
      }
    }

    if (r.title) {
      displayName += r.title + " ";
    }

    displayName += (r.base_name || r.name);

    namesHTML += `<div class="rabbi-label rabbi-name"
                        data-rabbi-index="${idx}"
                        style="pointer-events:auto;cursor:pointer;
                               background:${color};white-space:nowrap;">
                    ${displayName}${ageInfo}
                  </div>`;
  });

  namesHTML += `</div>`;

  return `<div style="pointer-events:none;display:flex;flex-direction:column;
                      align-items:center;gap:2px;">
            ${baseImg}${namesHTML}
          </div>`;
}

async function setupControlsAndDraw() {
  fromInput.value = Math.min(...YEARS);
  toInput.value = Math.max(...YEARS);
  ACTIVE_YEARS = [...YEARS];
  slider.max = ACTIVE_YEARS.length - 1;
  slider.value = 0;

  slider.oninput = async function() {
    currentIndex = parseInt(this.value);
    await show(ACTIVE_YEARS[currentIndex]);
  };

  applyBtn.onclick = async function() {
    const min = +fromInput.value, max = +toInput.value;
    ACTIVE_YEARS = YEARS.filter(v => v >= min && v <= max);
    slider.max = ACTIVE_YEARS.length - 1;
    currentIndex = 0;
    slider.value = 0;
    await show(ACTIVE_YEARS[0]);
  };

  document.getElementById("prevYear").onclick = async () => {
    if (currentIndex > 0) {
      currentIndex--;
      slider.value = currentIndex;
      await show(ACTIVE_YEARS[currentIndex], true);
    }
  };

  document.getElementById("nextYear").onclick = async () => {
    if (currentIndex < ACTIVE_YEARS.length - 1) {
      currentIndex++;
      slider.value = currentIndex;
      await show(ACTIVE_YEARS[currentIndex], true);
    }
  };

  map.on("zoomend", async () => {
    if (currentYear !== null) await show(currentYear);
  });

  Object.values(filters).forEach(cb =>
    cb.addEventListener("change", async () => {
      if (currentYear !== null) await show(currentYear);
    })
  );

  await show(ACTIVE_YEARS[0]);
}

async function main() {
  try {
    yearBox.textContent = "Loading data...";
    await loadInitialData();
    await setupControlsAndDraw();
  } catch (err) {
    console.error(err);
    yearBox.textContent = "Error loading map data";
    alert("Error loading map data. Check the browser console for details.");
  }
}

main();
</script>
