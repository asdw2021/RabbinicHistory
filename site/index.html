<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rabbinic History Map</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="static/css/styles.css" />
</head>

<body>
  <div id="map"></div>
  <div id="year">Loading...</div>

  <div id="yearNav">
    <button id="prevYear">⬅ Prev</button>
    <button id="nextYear">Next ➡</button>
  </div>

  <input id="slider" type="range" min="0" max="0" step="1" value="0" />

  <div id="rangeBox">
    From <input type="number" id="fromYear" />
    to <input type="number" id="toYear" />
    <button id="applyRange">Set</button>
  </div>

  <div id="filters">
    <label><input type="checkbox" id="toggleRabbis" checked /> Rabbis</label>
    <label><input type="checkbox" id="toggleShuls" checked /> Shuls</label>
    <label><input type="checkbox" id="togglePersonalities" checked /> Personalities</label>
    <label><input type="checkbox" id="toggleBattles" checked /> Battles</label>
    <label><input type="checkbox" id="toggleEvents" checked /> Events</label>
    <label><input type="checkbox" id="toggleRabbiEvents" checked /> Rabbi Events</label>
  </div>

<div id="rabbiSearchBox">
  <input
    id="rabbiSearchInput"
    list="rabbiSearchList"
    placeholder="Search rabbi..."
  />

  <datalist id="rabbiSearchList"></datalist>

  <button id="rabbiSearchButton">Go</button>
</div>


<div id="sizeControl">
  <label>
    Rabbi Size
    <input
      type="range"
      id="rabbiSizeSlider"
      min="0.25"
      max="1.5"
      step="0.05"
      value="0.65"
    />
  </label>

  <label style="display:block;margin-top:6px;">
    <input type="checkbox" id="toggleRabbiNames" checked />
    Show Rabbi Names
  </label>
</div>

  <div id="eventPanel">
    <button id="eventToggle">Events ▾</button>
    <div id="eventBox"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
